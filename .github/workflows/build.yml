name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Android SDK Platform 36
        run: |
          ANDROID_SDK_ROOT="${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}"
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -f "$SDKMANAGER" ]; then
            SDKMANAGER=$(find "$ANDROID_SDK_ROOT" -name "sdkmanager" 2>/dev/null | head -1)
          fi
          echo "Using sdkmanager at: $SDKMANAGER"
          yes | "$SDKMANAGER" "platforms;android-36" "build-tools;36.0.0" || true
          yes | "$SDKMANAGER" --licenses || true

      - name: Show Flutter version
        run: flutter --version

      # Our repo contains lib/, pubspec.yaml, assets/, and the workflow.
      # Regenerate the platform folders (android/ios/etc.) which aren't
      # committed, without overwriting our existing files.
      - name: Generate platform scaffolding
        run: flutter create . --org com.namazalert --project-name namaz_alert --platforms=android

      - name: Add required permissions to AndroidManifest
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          # Insert permissions right after the opening <manifest> tag.
          python3 - <<'PY'
          path = "android/app/src/main/AndroidManifest.xml"
          with open(path) as f:
              content = f.read()
          perms = '''
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>
              <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/>
              <uses-permission android:name="android.permission.VIBRATE"/>
          '''
          marker = '<manifest xmlns:android="http://schemas.android.com/apk/res/android">'
          if 'ACCESS_FINE_LOCATION' not in content:
              content = content.replace(marker, marker + perms, 1)
              with open(path, 'w') as f:
                  f.write(content)
              print("Permissions injected.")
          else:
              print("Permissions already present.")
          PY

      - name: Enable core library desugaring
        run: |
          python3 - <<'PY'
          import os

          # Newer Flutter generates Kotlin DSL (build.gradle.kts); older uses Groovy (build.gradle).
          kts = "android/app/build.gradle.kts"
          groovy = "android/app/build.gradle"
          path = kts if os.path.exists(kts) else groovy
          with open(path) as f:
              content = f.read()

          if "isCoreLibraryDesugaringEnabled" in content or "coreLibraryDesugaringEnabled" in content:
              print("Desugaring already enabled.")
          elif path == kts:
              # Kotlin DSL
              content = content.replace(
                  "compileOptions {",
                  "compileOptions {\n        isCoreLibraryDesugaringEnabled = true",
                  1,
              )
              if "dependencies {" in content:
                  content = content.replace(
                      "dependencies {",
                      'dependencies {\n    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.4")',
                      1,
                  )
              else:
                  content += '\ndependencies {\n    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.4")\n}\n'
              with open(path, "w") as f:
                  f.write(content)
              print("Desugaring enabled (Kotlin DSL).")
          else:
              # Groovy DSL
              content = content.replace(
                  "compileOptions {",
                  "compileOptions {\n        coreLibraryDesugaringEnabled true",
                  1,
              )
              if "dependencies {" in content:
                  content = content.replace(
                      "dependencies {",
                      "dependencies {\n    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'",
                      1,
                  )
              else:
                  content += "\ndependencies {\n    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'\n}\n"
              with open(path, "w") as f:
                  f.write(content)
              print("Desugaring enabled (Groovy DSL).")
          PY

      - name: Bump compileSdk for geocoding compatibility
        run: |
          python3 - <<'PY'
          import os, re

          kts = "android/app/build.gradle.kts"
          groovy = "android/app/build.gradle"
          path = kts if os.path.exists(kts) else groovy
          with open(path) as f:
              content = f.read()

          print("=== Lines mentioning Sdk BEFORE ===")
          for line in content.splitlines():
              if 'Sdk' in line:
                  print(repr(line))

          if path == kts:
              new_content = re.sub(
                  r'compileSdk\s*=?\s*(flutter\.compileSdkVersion|\d+)',
                  'compileSdk = 36',
                  content,
                  count=1,
              )
          else:
              new_content = re.sub(
                  r'compileSdkVersion\s+(flutter\.compileSdkVersion|\d+)',
                  'compileSdkVersion 36',
                  content,
                  count=1,
              )

          changed = new_content != content
          print("=== Regex changed file:", changed, "===")

          with open(path, "w") as f:
              f.write(new_content)

          print("=== Lines mentioning Sdk AFTER ===")
          for line in new_content.splitlines():
              if 'Sdk' in line:
                  print(repr(line))
          PY

      - name: Get dependencies
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Set app display name to SalahSync
        run: |
          python3 - <<'PY'
          path = "android/app/src/main/AndroidManifest.xml"
          with open(path) as f:
              content = f.read()
          import re
          content = re.sub(r'android:label="[^"]*"', 'android:label="SalahSync"', content, count=1)
          with open(path, "w") as f:
              f.write(content)
          print("App name set to SalahSync.")
          PY

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SalahSync-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
