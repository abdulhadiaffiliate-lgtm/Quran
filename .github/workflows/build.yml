name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Show Flutter version
        run: flutter --version

      - name: Generate platform scaffolding
        run: flutter create . --org com.namazalert --project-name namaz_alert --platforms=android

      - name: Add required permissions to AndroidManifest
        run: |
          python3 - <<'PY'
          path = "android/app/src/main/AndroidManifest.xml"
          with open(path) as f:
              content = f.read()
          perms = '''
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>
              <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/>
              <uses-permission android:name="android.permission.VIBRATE"/>
          '''
          marker = '<manifest xmlns:android="http://schemas.android.com/apk/res/android">'
          if 'ACCESS_FINE_LOCATION' not in content:
              content = content.replace(marker, marker + perms, 1)
              with open(path, 'w') as f:
                  f.write(content)
              print("Permissions injected.")
          else:
              print("Permissions already present.")
          PY

      - name: Enable core library desugaring
        run: |
          python3 - <<'PY'
          import os
          kts = "android/app/build.gradle.kts"
          groovy = "android/app/build.gradle"
          path = kts if os.path.exists(kts) else groovy
          with open(path) as f:
              content = f.read()
          if "isCoreLibraryDesugaringEnabled" in content or "coreLibraryDesugaringEnabled" in content:
              print("Desugaring already enabled.")
          elif path == kts:
              content = content.replace(
                  "compileOptions {",
                  "compileOptions {\n        isCoreLibraryDesugaringEnabled = true",
                  1,
              )
              if "dependencies {" in content:
                  content = content.replace(
                      "dependencies {",
                      'dependencies {\n    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.4")',
                      1,
                  )
              else:
                  content += '\ndependencies {\n    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.4")\n}\n'
              with open(path, "w") as f:
                  f.write(content)
              print("Desugaring enabled (Kotlin DSL).")
          else:
              content = content.replace(
                  "compileOptions {",
                  "compileOptions {\n        coreLibraryDesugaringEnabled true",
                  1,
              )
              if "dependencies {" in content:
                  content = content.replace(
                      "dependencies {",
                      "dependencies {\n    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'",
                      1,
                  )
              else:
                  content += "\ndependencies {\n    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'\n}\n"
              with open(path, "w") as f:
                  f.write(content)
              print("Desugaring enabled (Groovy DSL).")
          PY

      - name: Get dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: namaz-alert-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
